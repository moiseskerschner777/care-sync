services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - agents
    networks:
      - care-sync-net

  iris:
    build:
      context: ./iris
      dockerfile: Dockerfile
    ports:
      - "1972:1972"
      - "52773:52773"
    volumes:
      - iris-data:/durable
    networks:
      - care-sync-net
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-lc",
          "echo -e 'zn \"%SYS\"\\nset sc=##class(Security.Users).UnExpireUserPasswords(\"_SYSTEM\")\\nhalt' | iris session IRIS && echo > /dev/tcp/127.0.0.1/52773",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  labcore:
    build:
      context: ./core-lab
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    depends_on:
      iris:
        condition: service_healthy
    environment:
      IRIS_HOST: ${IRIS_HOST}
      IRIS_PORT: ${IRIS_PORT}
      IRIS_NAMESPACE: ${IRIS_NAMESPACE}
      IRIS_USERNAME: ${IRIS_USERNAME}
      IRIS_PASSWORD: ${IRIS_PASSWORD}
      AGENT_URL: ${AGENT_URL}
      DEBUG_HOST: ${DEBUG_HOST}
      DEBUG_PORT: ${DEBUG_PORT}
    restart: on-failure
    ports:
      - "8000:8000"
    networks:
      - care-sync-net

  reflab:
    build:
      context: ./ref-lab
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    restart: on-failure
    ports:
      - "8001:8001"
    networks:
      - care-sync-net

  vitacare:
    build:
      context: ./vita-care
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload
    restart: on-failure
    ports:
      - "8002:8002"
    networks:
      - care-sync-net

  agents:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    build:
      context: ./agents
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8003
    depends_on:
      iris:
        condition: service_healthy
      mcp-database-server-iris:
        condition: service_started
    environment:
      IRIS_HOST: ${IRIS_HOST}
      IRIS_PORT: ${IRIS_PORT}
      IRIS_NAMESPACE: ${IRIS_NAMESPACE}
      IRIS_USERNAME: ${IRIS_USERNAME}
      IRIS_PASSWORD: ${IRIS_PASSWORD}
      DEBUG_HOST: ${DEBUG_HOST}
      DEBUG_PORT: ${DEBUG_PORT}
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_API_BASE: ${LLM_API_BASE}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE}
      FHIR_BASE_URL: ${FHIR_BASE_URL}
      CODEBASE_MCP_URL: ${CODEBASE_MCP_URL}
      IRIS_MCP_URL: ${IRIS_MCP_URL}
    restart: on-failure
    ports:
      - "8003:8003"
    networks:
      - care-sync-net

  python-code-rag:
    build:
      context: ./python_code_rag
    ports:
      - "8004:8001"
      - "8005:8005"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      IRIS_HOST: ${IRIS_HOST}
      IRIS_PORT: ${IRIS_PORT}
      IRIS_NAMESPACE: ${IRIS_NAMESPACE}
      IRIS_USERNAME: ${IRIS_USERNAME}
      IRIS_PASSWORD: ${IRIS_PASSWORD}
      OLLAMA_URL: ${OLLAMA_URL}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-}
      EMBED_DIM: ${EMBED_DIM}
      EMBED_PARALLELISM: ${EMBED_PARALLELISM}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX}
    volumes:
      - ./core-lab:/core-lab:ro
    networks:
      - care-sync-net
    depends_on:
      iris:
        condition: service_healthy

  mcp-database-server-iris:
    build:
      context: ./mcp-database-server-iris
    ports:
      - "8006:3001"
    environment:
      IRIS_HOSTNAME: ${IRIS_HOSTNAME}
      IRIS_PORT: ${IRIS_PORT}
      IRIS_NAMESPACE: ${IRIS_NAMESPACE}
      IRIS_USERNAME: ${IRIS_USERNAME}
      IRIS_PASSWORD: ${IRIS_PASSWORD}
    networks:
      - care-sync-net
    depends_on:
      iris:
        condition: service_healthy

volumes:
  iris-data:

networks:
  care-sync-net:
    driver: bridge
