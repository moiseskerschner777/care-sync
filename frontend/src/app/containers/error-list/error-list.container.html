<div class="p-4">
  <p-toast />

  <div class="flex justify-content-between align-items-center mb-3">
    <h1 class="text-2xl font-bold">Error Reports</h1>
    <p-button label="Reload" icon="pi pi-refresh" (onClick)="loadReports()" />
  </div>

  @if (loading) {
    <div class="flex justify-content-center p-6">
      <p-progressSpinner />
    </div>
  } @else {
    <div class="flex flex-column gap-3">
      @for (report of reports; track report.id) {
        <app-error-summary-row
          [report]="report"
          (openDetail)="onOpenDetail($event)"
        />
      }
    </div>
  }

  <app-error-detail-modal
    [report]="selectedReport"
    [visible]="modalVisible"
    (close)="onCloseModal()"
    (confirmFix)="onConfirmFix($event)"
  />
</div>
